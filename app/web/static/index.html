<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>ProMan Market</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="app-header">
    <div class="head-row">
      <div class="brand-wrap">
        <span class="brand">ProMan Market</span>
        <span class="loc">📍 O'zbekiston bo'ylab yetkazamiz</span>
      </div>
      <div class="head-actions">
        <button id="cart-btn" class="icon-btn" aria-label="Savat">🛒<span id="cart-badge" class="badge" hidden>0</span></button>
        <button id="fav-btn" class="icon-btn" aria-label="Sevimlilar">🤍</button>
      </div>
    </div>
    <div class="searchbar">
      <span class="s-ico">🔍</span>
      <input id="search" type="search" placeholder="Nima qidiryapsiz?" autocomplete="off">
      <span class="s-right"><span>🎙</span><span>❐</span></span>
    </div>
  </header>

  <main id="view"><div class="loading">Yuklanmoqda…</div></main>

  <nav class="bottomnav">
    <button data-nav="home" class="nav-item active"><span class="ni-ico">🏠</span>Bosh sahifa</button>
    <button data-nav="catalog" class="nav-item"><span class="ni-ico">🗂</span>Katalog</button>
    <button data-nav="cart" class="nav-item"><span class="ni-ico">🛒</span><span id="nav-cart-badge" class="nbadge" hidden>0</span>Savat</button>
    <button data-nav="favorites" class="nav-item"><span class="ni-ico">❤️</span>Sevimlilar</button>
    <button data-nav="profile" class="nav-item"><span class="ni-ico">👤</span>Profil</button>
  </nav>

  <div id="a2hs" class="sheet" hidden>
    <div class="sheet-card">
      <div class="sheet-head">
        <div class="sheet-ico">📲</div>
        <div>
          <div class="sheet-title">Ilovani o'rnating</div>
          <div class="sheet-sub">Telefon ekraningizga qo'shing</div>
        </div>
      </div>
      <p class="sheet-text">ProMan'ni bosh ekranga qo'shsangiz, botni qidirmasdan bitta bosishda ochasiz.</p>
      <div class="sheet-actions">
        <button id="a2hs-add" class="btn btn-primary">O'rnatish</button>
        <button id="a2hs-later" class="btn btn-ghost">Keyinroq</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="/static/app.js"></script>
</body>
</html>
